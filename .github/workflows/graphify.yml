# Rebuild the checked-in graphify knowledge graph when code lands on main.
# AST-only (`graphify update`) — no LLM / API key required.

name: graphify

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - 'tech-digest-agent.html'
      - '**/*.js'
      - '**/*.mjs'
      - '**/*.cjs'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.jsx'
      - '**/*.py'
  workflow_dispatch:

concurrency:
  group: graphify-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  rebuild-graph:
    name: rebuild knowledge graph
    # Avoid re-entry if a prior graphify commit somehow matched the path filter.
    if: >
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, 'chore(graphify)')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install graphifyy
        run: pip install graphifyy

      - name: Rebuild graph (AST-only, no LLM)
        # --force: allow legitimate node-count drops after deletions/refactors.
        run: graphify update . --force

      - name: Commit graphify-out if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add graphify-out/
          if git diff --cached --quiet; then
            echo "Graph unchanged — no commit needed."
            exit 0
          fi
          git commit -m "chore(graphify): rebuild knowledge graph"
          git push
