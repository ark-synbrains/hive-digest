# Hive Digest — monthly SMTP send (hive.synbrains.ai)
#
# Product: Hive Digest | Repo: ark-synbrains/hive-digest
# Runs the Node sender in agent/ (npm package: hive-digest-agent).
#
# Schedule: 1st of each month at 09:00 IST (Asia/Kolkata).
# GitHub Actions cron is UTC-only, so this is 03:30 UTC on day 1 (= 09:00 IST).
#
# Required GitHub Actions secrets:
#   SMTP_HOST
#   SMTP_PORT          (e.g. 587)
#   SMTP_USER
#   SMTP_PASS
#   SMTP_FROM          (e.g. "Hive Digest <news@example.com>")
#   NEWSLETTER_TO_EMAILS   # historical env name for the recipient list
#
# Optional secrets / vars:
#   SMTP_SECURE        (true/false; defaults to true when port is 465)
#   SMTP_REPLY_TO
#
# Companion Cursor Automation recipe: .cursor/automations/hive-digest.md

name: Hive Digest monthly

on:
  schedule:
    - cron: '30 3 1 * *' # 09:00 IST on the 1st (UTC+5:30)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hive-digest
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: agent/package.json

      - name: Setup Python (content GraphRAG / Graphify)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Hive Digest sender deps
        run: npm install --prefix agent

      - name: Install graphifyy (optional content GraphRAG engine)
        run: pip install graphifyy
        continue-on-error: true

      - name: Generate and send Hive Digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_REPLY_TO: ${{ secrets.SMTP_REPLY_TO }}
          NEWSLETTER_TO_EMAILS: ${{ secrets.NEWSLETTER_TO_EMAILS }}
          # Content GraphRAG is on by default; set repository variable HIVE_GRAPHRAG=0 to disable.
          HIVE_GRAPHRAG: ${{ vars.HIVE_GRAPHRAG || '1' }}
        run: npm start --prefix agent

      - name: Commit archived issue under digests/
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add digests/ agent/state.json
          if git diff --cached --quiet; then
            echo "No digest archive changes to commit."
            exit 0
          fi
          git commit -m "chore(digests): archive Hive Digest issue"
          git push
