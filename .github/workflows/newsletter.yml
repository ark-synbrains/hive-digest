name: Send /dev/digest newsletter

on:
  schedule:
    # Every 12 hours (00:00 and 12:00 UTC)
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Generate only (do not send email)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      fixture:
        description: 'Use sample fixture content instead of Anthropic'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: dev-digest-newsletter
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: agent/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run newsletter agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          # Comma-separated list, e.g. "a@x.com,b@y.com"
          NEWSLETTER_TO_EMAILS: ${{ secrets.NEWSLETTER_TO_EMAILS }}
          # Fallback single address if NEWSLETTER_TO_EMAILS is unset
          NEWSLETTER_TO_EMAIL: ${{ secrets.NEWSLETTER_TO_EMAIL }}
          NEWSLETTER_REPLY_TO: ${{ secrets.NEWSLETTER_REPLY_TO }}
          NEWSLETTER_SCOPE: ${{ vars.NEWSLETTER_SCOPE }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: |
          ARGS=()
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          if [ "${{ github.event.inputs.fixture }}" = "true" ]; then
            ARGS+=(--fixture)
          fi
          node src/index.js ${ARGS[@]+"${ARGS[@]}"}
