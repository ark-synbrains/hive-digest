# /dev/digest — monthly newsletter automation
#
# Schedule: 1st of each month at 09:00 IST (Asia/Kolkata).
# GitHub Actions cron is UTC-only, so this is 03:30 UTC on day 1 (= 09:00 IST).
#
# Required GitHub Actions secrets:
#   SMTP_HOST
#   SMTP_PORT          (e.g. 587)
#   SMTP_USER
#   SMTP_PASS
#   SMTP_FROM          (e.g. "/dev/digest <news@example.com>")
#   NEWSLETTER_TO_EMAILS
#
# Optional secrets / vars:
#   SMTP_SECURE        (true/false; defaults to true when port is 465)
#   SMTP_REPLY_TO

name: /dev/digest monthly

on:
  schedule:
    - cron: '30 3 1 * *' # 09:00 IST on the 1st (UTC+5:30)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: newsletter
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: agent/package.json

      - name: Install agent deps
        run: npm install --prefix agent

      - name: Generate and send newsletter
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_REPLY_TO: ${{ secrets.SMTP_REPLY_TO }}
          NEWSLETTER_TO_EMAILS: ${{ secrets.NEWSLETTER_TO_EMAILS }}
        run: npm start --prefix agent
